<!doctype html>
<html lang="en">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Builderr - Create beautiful professional portfolios in minutes. The effortless portfolio builder for developers and creatives."
    />
    <meta name="keywords" content="portfolio builder, developer portfolio, creative portfolio, website builder, Builderr" />

    <meta property="og:type" content="website" />

    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://buildrr.com/" />
    <meta property="twitter:title" content="Builderr - Create Professional Portfolios in Minutes" />
    <meta property="twitter:description" content="Affordable, beautiful, and professional portfolio builder for modern creatives and developers." />
    <meta property="twitter:image" content="https://buildrr.com/og-image.png" />

    <!-- Canonical & Robots -->
    <link rel="canonical" href="https://buildrr.com/" />
    <meta name="robots" content="index, follow" />

    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Builderr",

      "description": "Create beautiful professional portfolios in minutes. The effortless portfolio builder for developers and creatives."
    }

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Builderr</title>
    <script src="https://js.paystack.co/v2/inline.js"></script>
